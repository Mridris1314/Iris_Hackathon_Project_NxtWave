services:
  - type: web
    name: iris-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: iris-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DESCRIBE_RATE_LIMIT
        value: "15"

databases:
  - name: iris-db
    databaseName: iris
    user: iris
    plan: free
